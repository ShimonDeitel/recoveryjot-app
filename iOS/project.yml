name: Recoveryjot
options:
  bundleIdPrefix: com.shimondeitel.recoveryjot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Recoveryjot:
    type: application
    platform: iOS
    sources:
      - path: Recoveryjot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recoveryjot
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Recoveryjot/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RecoveryjotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RecoveryjotTests
      - path: Recoveryjot.storekit
    dependencies:
      - target: Recoveryjot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recoveryjot.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RecoveryjotUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RecoveryjotUITests
    dependencies:
      - target: Recoveryjot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recoveryjot.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Recoveryjot:
    build:
      targets:
        Recoveryjot: all
        RecoveryjotTests: [test]
        RecoveryjotUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Recoveryjot.storekit
    test:
      config: Debug
      storeKitConfiguration: Recoveryjot.storekit
      targets:
        - RecoveryjotTests
        - RecoveryjotUITests
    archive:
      config: Release
